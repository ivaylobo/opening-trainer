<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8" />
    <title>Opening Trainer</title>

    <!-- Chessboard CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
        }

        #app {
            width: min(100%, 1400px);
            min-height: 100vh;
            margin: 0 auto;
            padding: 20px 24px 24px;
        }

        h2 {
            margin: 0 0 16px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        #board {
            width: 100%;
            margin: 0 auto;
        }

        #board.showing-opening {
            pointer-events: none;
        }

        #board-container {
            position: relative;
            width: min(100%, 960px);
            margin: 0 auto;
        }

        #pauseButton {
            display: none;
        }

        #sideToggle {
            min-width: 120px;
            font-weight: 700;
        }

        #sideToggle.white {
            background: #f3f3f3;
            color: #111;
        }

        #sideToggle.black {
            background: #111;
            color: #fff;
            border: 1px solid #666;
        }

        select,
        button {
            padding: 10px;
            font-size: 16px;
        }

        #openingSelect {
            min-width: 220px;
        }

        #feedback {
            margin-top: 16px;
            min-height: 48px;
            font-size: 18px;
        }

        .correct {
            color: #4caf50;
        }

        .wrong {
            color: #f44336;
        }

        @media (max-width: 767px) {
            #app {
                padding: 16px 12px 20px;
            }

            .controls {
                gap: 10px;
                margin-bottom: 16px;
            }

            select,
            button {
                width: 100%;
                max-width: 360px;
            }

            #openingSelect {
                min-width: 0;
            }

        }
    </style>
</head>

<body>
    <div id="app">
        <h2>Opening Trainer</h2>

    <div class="controls">
        <button id="sideToggle" class="white" type="button">White</button>
        <select id="openingSelect"></select>
        <button id="resetButton">Restart</button>
        <button id="showButton">Show</button>
        <button id="pauseButton">Pause</button>
    </div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="feedback"></div>
    </div>

    <!-- Libraries -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        let openings = {
            white: {},
            black: {}
        };
        let board;

        // Load openings from JSON file
        fetch('debuts.json')
            .then(response => response.json())
            .then(data => {
                openings = normalizeOpenings(data);
                initializeGame();
            })
            .catch(error => console.error('Error loading debuts.json:', error));

        let game;
        let moveIndex = 0;
        let currentOpening = [];
        let isShowing = false;
        let isPaused = false;
        let previewGame = null;
        let previewMoves = [];
        let previewIndex = 0;
        let previewTimer = null;
        let replyTimer = null;
        let openingComplete = false;
        let currentSide = "white";
        const selectedOpeningBySide = {
            white: "",
            black: ""
        };
        const STEP_DELAY_MS = 2000;

        const sideToggleButton = document.getElementById("sideToggle");
        const select = document.getElementById("openingSelect");
        const boardElement = document.getElementById("board");
        const boardContainer = document.getElementById("board-container");
        const resetButton = document.getElementById("resetButton");
        const showButton = document.getElementById("showButton");
        const pauseButton = document.getElementById("pauseButton");
        const feedbackEl = document.getElementById("feedback");

        function normalizeOpenings(data) {
            const hasSideBuckets = data && typeof data === "object" && !Array.isArray(data) && ("white" in data || "black" in data);

            if (hasSideBuckets) {
                return {
                    white: data.white || {},
                    black: data.black || {}
                };
            }

            return {
                white: data || {},
                black: {}
            };
        }

        function getSideOpenings() {
            return openings[currentSide] || {};
        }

        function getPlayerColor() {
            return currentSide === "white" ? "w" : "b";
        }

        function updateSideToggle() {
            sideToggleButton.textContent = currentSide === "white" ? "White" : "Black";
            sideToggleButton.className = currentSide;
            sideToggleButton.setAttribute("aria-label", `Current repertoire: ${currentSide}`);
        }

        function populateOpeningSelect() {
            const sideOpenings = getSideOpenings();
            const openingNames = Object.keys(sideOpenings);
            const previousSelection = selectedOpeningBySide[currentSide];

            select.innerHTML = "";

            openingNames.forEach(name => {
                const opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });

            if (!openingNames.length) {
                selectedOpeningBySide[currentSide] = "";
                return;
            }

            const nextSelection = sideOpenings[previousSelection] ? previousSelection : openingNames[0];
            select.value = nextSelection;
            selectedOpeningBySide[currentSide] = nextSelection;
        }

        function syncBoardSize() {
            const isMobile = window.innerWidth < 768;
            const topOffset = boardContainer.getBoundingClientRect().top;
            const horizontalPadding = isMobile ? 24 : 48;
            const verticalPadding = isMobile ? 20 : 28;
            const reservedFeedbackSpace = isMobile ? 88 : 96;
            const maxWidth = Math.max(180, window.innerWidth - horizontalPadding);
            const maxHeight = Math.max(180, window.innerHeight - topOffset - reservedFeedbackSpace - verticalPadding);
            const boardSize = Math.min(maxWidth, maxHeight, 920);

            boardContainer.style.width = `${Math.floor(boardSize)}px`;

            if (board) {
                board.resize();
            }
        }

        function clearPendingTimers() {
            if (previewTimer) {
                clearTimeout(previewTimer);
                previewTimer = null;
            }

            if (replyTimer) {
                clearTimeout(replyTimer);
                replyTimer = null;
            }
        }

        function renderMove(move, chessInstance) {
            if (move) {
                board.move(`${move.from}-${move.to}`);
                applyCastlingRook(move);
                return;
            }

            board.position(chessInstance.fen());
        }

        function finishOpening() {
            if (openingComplete) return;

            openingComplete = true;
            setFeedback("Opening complete!", "correct");

            setTimeout(() => {
                alert("You successfully finished the opening");
                reset();
            }, 1000);
        }

        function playOpponentMove(delayMs = 0) {
            if (isShowing || openingComplete || moveIndex >= currentOpening.length || game.turn() === getPlayerColor()) {
                return;
            }

            const runMove = () => {
                const nextMoveSan = currentOpening[moveIndex];
                const autoMove = game.move(nextMoveSan);

                renderMove(autoMove, game);
                moveIndex++;

                if (moveIndex >= currentOpening.length) {
                    finishOpening();
                }
            };

            if (delayMs > 0) {
                replyTimer = setTimeout(() => {
                    replyTimer = null;
                    runMove();
                }, delayMs);
                return;
            }

            runMove();
        }

        function initializeGame() {
            updateSideToggle();
            populateOpeningSelect();

            // Initialize chessboard
            board = Chessboard("board", {
                draggable: true,
                position: "start",
                orientation: currentSide,
                onDrop: onDrop,
                pieceTheme: "assets/chesspieces/wikipedia/{piece}.png"
            });

            // Start the game
            start();
            syncBoardSize();
        }

        sideToggleButton.addEventListener("click", () => {
            currentSide = currentSide === "white" ? "black" : "white";
            updateSideToggle();
            populateOpeningSelect();
            start();
        });
        select.addEventListener("change", () => {
            selectedOpeningBySide[currentSide] = select.value;
            start();
        });
        resetButton.addEventListener("click", reset);
        showButton.addEventListener("click", showOpening);
        pauseButton.addEventListener("click", togglePause);
        window.addEventListener("resize", syncBoardSize);

        function initGame() {
            game = new Chess();
        }

        function setFeedback(text, cls = "") {
            feedbackEl.textContent = text;
            feedbackEl.className = cls;
        }

        // Helper: move rook as well when castling
        function applyCastlingRook(move) {
            if (!move || typeof move.flags !== "string" || move.piece !== "k") return;

            if (move.flags.indexOf("k") !== -1) {
                const rookFrom = move.color === "w" ? "h1" : "h8";
                const rookTo = move.color === "w" ? "f1" : "f8";
                board.move(`${rookFrom}-${rookTo}`);
            } else if (move.flags.indexOf("q") !== -1) {
                const rookFrom = move.color === "w" ? "a1" : "a8";
                const rookTo = move.color === "w" ? "d1" : "d8";
                board.move(`${rookFrom}-${rookTo}`);
            }
        }

        function start() {
            isShowing = false;
            isPaused = false;
            openingComplete = false;
            clearPendingTimers();

            boardElement.classList.remove("showing-opening");
            pauseButton.style.display = "none";
            pauseButton.textContent = "Pause";

            initGame();
            moveIndex = 0;
            currentOpening = getSideOpenings()[select.value] || [];
            board.orientation(currentSide);
            board.position("start");
            setFeedback("");

            if (!currentOpening.length) {
                setFeedback("No openings available for this side.", "wrong");
                return;
            }

            playOpponentMove();
        }

        function reset() {
            start();
        }

        function onDrop(source, target) {
            if (isShowing || openingComplete) return "snapback";

            const move = game.move({
                from: source,
                to: target,
                promotion: "q"
            });


            if (!move) return "snapback";

            const expected = currentOpening[moveIndex];

            if (move.san !== expected) {
                setFeedback(`Wrong: ${move.san} | expected: ${expected}`, "wrong");
                game.undo();
                return "snapback";
            }

            moveIndex++;
            setFeedback("Good!", "correct");

            // handle castling rook movement for player's move
            applyCastlingRook(move);

            if (moveIndex >= currentOpening.length) {
                finishOpening();
                return;
            }

            if (game.turn() !== getPlayerColor()) {
                playOpponentMove(300);
            }
        }

        function scheduleNextPreviewMove() {
            if (!isShowing || isPaused) return;

            if (previewIndex >= previewMoves.length) {
                isShowing = false;
                isPaused = false;
                boardElement.classList.remove("showing-opening");
                pauseButton.style.display = "none";
                pauseButton.textContent = "Pause";
                start();
                return;
            }

            const san = previewMoves[previewIndex];
            previewTimer = setTimeout(() => {
                const move = previewGame.move(san);
                if (move) {
                    board.move(`${move.from}-${move.to}`);
                    applyCastlingRook(move);
                } else {
                    board.position(previewGame.fen());
                }
                previewIndex++;
                scheduleNextPreviewMove();
            }, STEP_DELAY_MS);
        }

        function showOpening() {
            if (isShowing) return;

            isShowing = true;
            isPaused = false;
            boardElement.classList.add("showing-opening");
            pauseButton.style.display = "inline-block";
            pauseButton.textContent = "Pause";

            previewGame = new Chess();
            previewMoves = getSideOpenings()[select.value] || [];
            previewIndex = 0;

            board.orientation(currentSide);
            board.position("start");
            previewGame.reset();
            setFeedback("");

            if (!previewMoves.length) {
                isShowing = false;
                boardElement.classList.remove("showing-opening");
                pauseButton.style.display = "none";
                return;
            }

            scheduleNextPreviewMove();
        }

        function togglePause() {
            if (!isShowing) return;

            if (!isPaused) {
                isPaused = true;
                if (previewTimer) {
                    clearTimeout(previewTimer);
                    previewTimer = null;
                }
                pauseButton.textContent = "Resume";
            } else {
                isPaused = false;
                pauseButton.textContent = "Pause";
                scheduleNextPreviewMove();
            }
        }
    </script>

</body>

</html>
